name: CI - Maven Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Build and Test
        run: mvn clean test --file Bai9.3/pom.xml

      - name: Package JAR
        run: mvn package -DskipTests --file Bai9.3/pom.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: calculator-jar
          path: Bai9.3/target/*.jar
          retention-days: 7